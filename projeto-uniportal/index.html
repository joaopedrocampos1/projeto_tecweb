<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniPortal - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="login-container">
        <section class="login-box">
            <header>
                <img src="img/logo.png" alt="Logo UniPortal" class="logo-login">
                <h1>Bem-vindo de volta</h1>
                <p>Acesse sua conta para continuar</p>
            </header>

            <form id="formLogin">
                <label for="usuario">USUÁRIO</label>
                <input type="email" id="usuario" placeholder="RA ou e-mail institucional" required>

                <label for="senha">SENHA</label>
                <input type="password" id="senha" placeholder="********" required>

                <button type="submit">Entrar</button>
            </form>
            <aside id="mensagemFeedback">
         <footer>
            <button id="btnSair" class="btn-logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Sair
            </button>
          </footer>
            </aside>
        </section>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
