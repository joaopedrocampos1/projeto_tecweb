<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniPortal - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
    <main class="login-container">
        <section class="login-box">
            <header>
                <h1 style="color: var(--vermelho-uni); margin-bottom: 0.625rem;">UniPortal</h1>
                <h2>Bem-vindo de volta</h2>
                <p>Acesse sua conta para continuar</p>
            </header>
            <form id="formLogin">
                <label for="usuario">USUÁRIO</label>
                <input type="text" id="usuario" placeholder="RA ou e-mail institucional" required>
                <label for="senha">SENHA</label>
                <input type="password" id="senha" placeholder="********" required>
                <button type="submit">Entrar</button>
            </form>
           <aside class="sidebar">
        <header class="sidebar-header"><h2 class="logo">UniPortal</h2></header>
        
        <section class="user-profile">
            <figure class="avatar">JS</figure>
            <address class="user-info">
                <strong>João Silva</strong>
                <span>RA: 2512130067</span>
            </address>
        </section>

        <nav>
            <menu>
                <li><a href="home.html"><i class="fa-solid fa-house"></i> Início</a></li>
                <li><a href="disciplinas.html"><i class="fa-solid fa-book"></i> Disciplinas</a></li>
                <li><a href="boletim.html"><i class="fa-solid fa-chart-simple"></i> Boletim</a></li>
                <li><a href="carteirinha.html"><i class="fa-solid fa-id-card"></i> Carteirinha</a></li>
                <li><a href="faturas.html"><i class="fa-solid fa-file-invoice-dollar"></i> Faturas</a></li>
            </menu>
        </nav>
        
        <footer>
            <button id="btnSair" class="btn-logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Sair
            </button>
        </footer>
    </aside>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
